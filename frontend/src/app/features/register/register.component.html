<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">
      <h1 class="h4 mb-4 text-center">AgroSolutions</h1>
      <p class="text-muted text-center small mb-4">Cadastro do produtor rural</p>

      <form (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label" for="name">Nome</label>
          <input
            id="name"
            type="text"
            class="form-control"
            [(ngModel)]="name"
            name="name"
            placeholder="Seu nome completo"
            autocomplete="name"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="email">E-mail</label>
          <input
            id="email"
            type="email"
            class="form-control"
            [(ngModel)]="email"
            name="email"
            placeholder="seu@email.com"
            autocomplete="email"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="password">Senha</label>
          <input
            id="password"
            type="password"
            class="form-control"
            [(ngModel)]="password"
            name="password"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        <div class="mb-3">
          <label class="form-label" for="confirmPassword">Confirmar senha</label>
          <input
            id="confirmPassword"
            type="password"
            class="form-control"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="••••••••"
            autocomplete="new-password"
          />
        </div>
        @if (error) {
          <div class="alert alert-danger py-2 small" role="alert">{{ error }}</div>
        }
        <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
          {{ loading ? 'Cadastrando...' : 'Cadastrar' }}
        </button>
      </form>

      <p class="text-center text-muted small mt-3 mb-0">
        Já tem conta? <a routerLink="/login">Entrar</a>
      </p>
    </div>
  </div>
</div>
