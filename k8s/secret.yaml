# Secret do Kubernetes para dados sensíveis.
# O Kubernetes não lê o arquivo .env; ele usa recursos Secret. Por isso este arquivo existe.
# Alternativa: crie o secret a partir do mesmo .env usado no Docker Compose (evita duplicação):
#   kubectl create secret generic agrosolutions-secrets --from-env-file=.env -n default
# Este YAML é um template com valores de exemplo; em produção use valores reais ou --from-env-file.
#
# Verificar se o conteúdo não está igual ao .env da raiz (evitar commit de segredos reais):
#   .\scripts\check-secret-env.ps1
---
apiVersion: v1
kind: Secret
metadata:
  name: agrosolutions-secrets
  namespace: default
type: Opaque
stringData:
  # Senha do banco de dados
  DB_PASSWORD: "ChangeMe123!"
  SA_PASSWORD: "ChangeMe123!"
  
  # Credenciais do RabbitMQ
  RABBITMQ_USERNAME: "agrosolutions"
  RABBITMQ_PASSWORD: "ChangeMe123!"
  
  # Segredo JWT
  JWT_SECRET: "YourSuperSecretJWTKeyForProductionUse-ChangeThisInProduction-AtLeast64CharactersLong!"
  
  # Strings de conexão (serão utilizadas nos deployments)
  ALERTS_DB_CONNECTION: "Server=sqlserver;Database=AgroSolutions.Alerts;User Id=sa;Password=ChangeMe123!;MultipleActiveResultSets=true;TrustServerCertificate=True"
  FARM_DB_CONNECTION: "Server=sqlserver;Database=AgroSolutions.Farm;User Id=sa;Password=ChangeMe123!;MultipleActiveResultSets=true;TrustServerCertificate=True"
  SENSOR_INGESTION_DB_CONNECTION: "Server=sqlserver;Database=AgroSolutions.SensorIngestion;User Id=sa;Password=ChangeMe123!;MultipleActiveResultSets=true;TrustServerCertificate=True"
  USERS_DB_CONNECTION: "Server=sqlserver;Database=AgroSolutions.Users;User Id=sa;Password=ChangeMe123!;MultipleActiveResultSets=true;TrustServerCertificate=True"

