name: .NET CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DOCKER_REGISTRY: docker.io
  # Atualize estes nomes de imagem com seu usuário do DockerHub
  ALERTS_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/agrosolutions-alerts-api
  FARM_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/agrosolutions-farm-api
  SENSOR_INGESTION_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/agrosolutions-sensor-ingestion-api
  USERS_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/agrosolutions-users-api

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Restore dependencies - Alerts
      working-directory: ./Alerts/src
      run: dotnet restore

    - name: Restore dependencies - Farm
      working-directory: ./Farm/src
      run: dotnet restore

    - name: Restore dependencies - SensorIngestion
      working-directory: ./SensorIngestion/src
      run: dotnet restore

    - name: Restore dependencies - Users
      working-directory: ./Users/src
      run: dotnet restore

    - name: Restore dependencies - AgroSolutions.Tests
      working-directory: .
      run: dotnet restore AgroSolutions.Tests/AgroSolutions.Tests.csproj

    - name: Build - AgroSolutions.Tests
      working-directory: .
      run: dotnet build AgroSolutions.Tests/AgroSolutions.Tests.csproj --no-restore -c Release

    - name: Build - Alerts
      working-directory: ./Alerts/src
      run: dotnet build --no-restore -c Release

    - name: Build - Farm
      working-directory: ./Farm/src
      run: dotnet build --no-restore -c Release

    - name: Build - SensorIngestion
      working-directory: ./SensorIngestion/src
      run: dotnet build --no-restore -c Release

    - name: Build - Users
      working-directory: ./Users/src
      run: dotnet build --no-restore -c Release

    # Unit tests - Domain/Core layer
    - name: Test - AgroSolutions.Tests
      working-directory: .
      run: dotnet test AgroSolutions.Tests/AgroSolutions.Tests.csproj --no-build -c Release --verbosity normal

    # Etapas de teste (se existirem projetos de teste)
    - name: Test - Alerts
      working-directory: ./Alerts/src
      run: dotnet test --no-build --no-restore --verbosity normal || true
      continue-on-error: true

    - name: Test - Farm
      working-directory: ./Farm/src
      run: dotnet test --no-build --no-restore --verbosity normal || true
      continue-on-error: true

    - name: Test - SensorIngestion
      working-directory: ./SensorIngestion/src
      run: dotnet test --no-build --no-restore --verbosity normal || true
      continue-on-error: true

    - name: Test - Users
      working-directory: ./Users/src
      run: dotnet test --no-build --no-restore --verbosity normal || true
      continue-on-error: true

  build-and-push-docker:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name != 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract metadata for Alerts API
      id: meta-alerts
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.ALERTS_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Alerts API image
      uses: docker/build-push-action@v5
      with:
        context: ./Alerts/src
        file: ./Alerts/src/FIAP.AgroSolutions.Alerts.Api/Dockerfile
        push: true
        tags: ${{ steps.meta-alerts.outputs.tags }}
        labels: ${{ steps.meta-alerts.outputs.labels }}
        cache-from: type=registry,ref=${{ env.ALERTS_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.ALERTS_IMAGE }}:buildcache,mode=max

    - name: Extract metadata for Farm API
      id: meta-farm
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.FARM_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Farm API image
      uses: docker/build-push-action@v5
      with:
        context: ./Farm/src
        file: ./Farm/src/FIAP.AgroSolutions.Farm.Api/Dockerfile
        push: true
        tags: ${{ steps.meta-farm.outputs.tags }}
        labels: ${{ steps.meta-farm.outputs.labels }}
        cache-from: type=registry,ref=${{ env.FARM_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.FARM_IMAGE }}:buildcache,mode=max

    - name: Extract metadata for SensorIngestion API
      id: meta-sensor
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.SENSOR_INGESTION_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push SensorIngestion API image
      uses: docker/build-push-action@v5
      with:
        context: ./SensorIngestion/src
        file: ./SensorIngestion/src/FIAP.AgroSolutions.SensorIngestion.Api/Dockerfile
        push: true
        tags: ${{ steps.meta-sensor.outputs.tags }}
        labels: ${{ steps.meta-sensor.outputs.labels }}
        cache-from: type=registry,ref=${{ env.SENSOR_INGESTION_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.SENSOR_INGESTION_IMAGE }}:buildcache,mode=max

    - name: Extract metadata for Users API
      id: meta-users
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.USERS_IMAGE }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Users API image
      uses: docker/build-push-action@v5
      with:
        context: ./Users/src
        file: ./Users/src/FIAP.AgroSolutions.Users.Api/Dockerfile
        push: true
        tags: ${{ steps.meta-users.outputs.tags }}
        labels: ${{ steps.meta-users.outputs.labels }}
        cache-from: type=registry,ref=${{ env.USERS_IMAGE }}:buildcache
        cache-to: type=registry,ref=${{ env.USERS_IMAGE }}:buildcache,mode=max

